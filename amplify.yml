version: 1
# Amplify Gen 2 fullstack build: deploy the backend (Cognito/AppSync/DynamoDB)
# via the pipeline, which generates amplify_outputs.json, then build the Vite app
# (src/amplifyConfig.js imports that file).
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
