version: 1
# Amplify Gen 2 fullstack build: deploy the backend (Cognito/AppSync/DynamoDB)
# via the pipeline, which generates amplify_outputs.json, then build the Vite app
# (src/amplifyConfig.js imports that file).
backend:
  phases:
    build:
      commands:
        # npm install (not ci): @aws-amplify/backend-cli bundles deps that npm
        # omits from the lockfile, so `npm ci` rejects the lock. --legacy-peer-deps
        # avoids the zod peer-dependency conflict in the Amplify backend packages.
        - npm install --legacy-peer-deps --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
